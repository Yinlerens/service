apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-service
  namespace: status-service
  labels:
    app.kubernetes.io/name: status-service
    app.kubernetes.io/part-of: status-service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: status-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: status-service
        app.kubernetes.io/part-of: status-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: status-service
          image: ghcr.io/yinlerens/service@sha256:cec46efbb8f3374a7536c70cc7c17f0a1eca8ff06307e1afa2282134aeba083c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              port: http
              path: /health
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              port: http
              path: /health
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: http
              path: /health
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
