apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: status-service-gw
  namespace: status-service
  labels:
    app.kubernetes.io/name: status-service
    app.kubernetes.io/part-of: status-service
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 18082
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: status-service
  namespace: status-service
  labels:
    app.kubernetes.io/name: status-service
    app.kubernetes.io/part-of: status-service
spec:
  parentRefs:
    - name: status-service-gw
      sectionName: http
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: status-service
          port: 80
