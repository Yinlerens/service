apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: status-service
  namespace: argocd
  labels:
    app.kubernetes.io/name: status-service
    app.kubernetes.io/part-of: status-service
spec:
  project: default
  source:
    repoURL: https://github.com/Yinlerens/service.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: status-service
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
